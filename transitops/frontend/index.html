<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps — Smart Transport Operations</title>
  <meta name="description" content="TransitOps: manage fleet, drivers, trips, compliance and finances in one place.">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ============================================================
       AUTH SCREEN
  ============================================================= -->
  <div id="auth-screen">
    <div class="auth-card">
      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div>
          <div class="auth-brand-name">TransitOps</div>
          <div class="auth-brand-sub">Smart Transport Operations</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs" id="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
      </div>

      <!-- Login Form -->
      <div id="login-form-wrap">
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="login-email">Email address</label>
            <input id="login-email" type="email" class="form-control" placeholder="you@company.com" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input id="login-password" type="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <p id="login-error" class="form-error"></p>
          <button type="submit" class="btn btn-primary btn-full mt-2" id="login-btn">Sign In</button>
        </form>
        <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--c-border);">
          <p class="text-sm text-muted" style="margin-bottom: 8px; font-weight: 600;">Quick demo logins — all passwords: <code>transitops123</code></p>
          <div id="demo-accounts" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;"></div>
        </div>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-form-wrap" style="display: none;">
        <form id="signup-form" autocomplete="on">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="su-name">Full Name</label>
              <input id="su-name" type="text" class="form-control" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="su-phone">Contact Number</label>
              <input id="su-phone" type="tel" class="form-control" placeholder="10-digit number">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="su-email">Email address</label>
            <input id="su-email" type="email" class="form-control" placeholder="you@email.com" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="su-password">Password</label>
            <input id="su-password" type="password" class="form-control" placeholder="Min. 6 characters" required autocomplete="new-password">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="su-lic-num">License Number</label>
              <input id="su-lic-num" type="text" class="form-control" placeholder="e.g. TN02 20240006663" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="su-lic-cat">License Category</label>
              <input id="su-lic-cat" type="text" class="form-control" placeholder="e.g. LMV, HMV">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="su-lic-expiry">License Expiry Date</label>
            <input id="su-lic-expiry" type="date" class="form-control">
          </div>
          <p id="signup-error" class="form-error"></p>
          <button type="submit" class="btn btn-primary btn-full mt-2" id="signup-btn">Create Driver Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============================================================
       APP SHELL
  ============================================================= -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <span class="sidebar-logo-text">TransitOps</span>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar" id="user-avatar"></div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="user-name"></div>
            <div class="sidebar-user-role" id="user-role"></div>
          </div>
          <button class="icon-btn" id="logout-btn" title="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay"></div>

    <!-- Topbar -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="theme-toggle" title="Toggle dark mode">
          <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main id="main">
      <div id="page" class="fade-in"></div>
    </main>
  </div>

  <!-- Modal host -->
  <div id="modal-backdrop">
    <div id="modal-card" class="modal-card"></div>
  </div>

  <!-- Toast host -->
  <div id="toast-host"></div>

  <script src="/app.js?v=5"></script>
</body>
</html>
